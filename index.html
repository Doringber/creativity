<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#3d52f0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Pango GO</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <video id="camera" playsinline autoplay muted></video>
  <div id="camera-fallback" class="camera-fallback"></div>

  <!-- AR stage (shakes on impact) -->
  <div id="stage">
    <div id="playfield"></div>
    <div id="aim"></div>
    <div id="balllayer"></div>
    <div id="radar"></div>
  </div>
  <div id="fx"></div>
  <div class="fever-flash" id="fever-flash"></div>

  <!-- in-game HUD -->
  <header id="hud" class="hud hidden">
    <div class="hud-pill score-pill"><span id="score">0</span></div>
    <div class="hud-pill combo-pill hidden" id="combo-pill">🔥 <span id="combo">x2</span></div>
    <div class="hud-pill timer-pill"><span id="timer">60</span><small>s</small></div>
    <button id="pause-btn" class="hud-pill icon-pill">⏸</button>
  </header>

  <!-- in-game weapon switch -->
  <button id="weapon-btn" class="weapon-btn hidden"><img id="weapon-img" alt="" /></button>

  <!-- fever meter -->
  <div id="fever" class="fever hidden">
    <div id="fever-fill" class="fever-fill"></div>
    <span class="fever-label">PANGO&nbsp;FEVER</span>
  </div>

  <!-- ===================== HOME ===================== -->
  <section id="home-screen" class="overlay home">
    <!-- top bar: level + currencies -->
    <div class="hbar">
      <div class="lvlchip"><span class="ring" id="lvl-ring"><b id="player-level">1</b></span><span class="pname" id="player-name-top">שחקן</span></div>
      <div class="curbar">
        <span class="cur gold">🪙 <b id="home-coins">0</b></span>
        <span class="cur gem">💎 <b id="home-gems">0</b></span>
        <button class="cur snd" id="sound-btn"><span class="ic">🔊</span></button>
      </div>
    </div>

    <!-- Pango Pass (player XP progression) -->
    <div class="passbar">
      <div class="prow"><span>🎟️ פנגו-פס · רמה <b id="pass-level">1</b></span><span id="pass-next"></span></div>
      <div class="pbar"><i id="pass-fill"></i></div>
    </div>

    <!-- tab content -->
    <div class="tabwrap">
      <div class="tabpane act" data-pane="home">
        <div class="cityline"></div>
        <h1 class="title">Pango <span class="title-accent">GO</span></h1>
        <div class="mission-chip" id="mission-chip"><span>🎯</span><span id="mission-text">משימה יומית</span><b id="mission-reward">+60</b></div>
        <div id="vs-banner" class="vs-banner hidden"></div>
        <div class="hero-wrap"><div class="podium"></div><img id="home-mascot" class="hero" alt="Pango" /></div>
        <div class="modepick" id="modepick">
          <button class="modechip act" data-mode="hunt"><span>🧭</span>ציד</button>
          <button class="modechip" data-mode="frenzy"><span>🔥</span>טירוף</button>
          <button class="modechip" data-mode="slice"><span>🍉</span>שיסוף</button>
        </div>
        <div class="playrow">
          <button class="icbtn" id="to-weapons" title="נשקים">🪄</button>
          <button id="play-btn" class="btn btn-primary big">שחק</button>
          <button class="icbtn" id="to-dex" title="פנגודקס">📒</button>
        </div>
        <p class="howline" id="howline">🧭 הזז את הטלפון · גרור וזרוק לתפיסה</p>
      </div>

      <div class="tabpane" data-pane="weapons">
        <h2 class="panetitle">🪄 הנשק שלך <small>— בחר את מה שזורקים</small></h2>
        <div class="weap-bar" id="weap-bar"></div>
      </div>

      <div class="tabpane" data-pane="shop">
        <h2 class="panetitle">🛒 חנות</h2>
        <div id="shop" class="shop"></div>
      </div>

      <div class="tabpane" data-pane="dex">
        <h2 class="panetitle">📒 פנגודקס</h2>
        <div class="dex-grid" id="dex-strip"></div>
      </div>

      <div class="tabpane" data-pane="board">
        <h2 class="panetitle">🏆 דירוג <small>— שיא: <b id="home-best">0</b></small></h2>
        <ol id="home-top3" class="top3"></ol>
      </div>
    </div>

    <!-- bottom tab bar -->
    <nav class="tabbar">
      <button class="tab" data-tab="shop"><span class="ic">🛒</span>חנות</button>
      <button class="tab" data-tab="dex"><span class="ic">📒</span>פנגודקס</button>
      <button class="tab act" data-tab="home"><span class="ic">🏠</span>בית</button>
      <button class="tab" data-tab="weapons"><span class="ic">🪄</span>נשקים</button>
      <button class="tab" data-tab="board"><span class="ic">🏆</span>דירוג</button>
    </nav>
  </section>

  <!-- ===================== END ===================== -->
  <section id="end-screen" class="overlay hidden">
    <div class="home-card">
      <div class="end-emoji" id="end-emoji">🎉</div>
      <div class="final-score" id="final-score">0</div>
      <div class="final-label">נקודות</div>

      <div class="end-stats">
        <div class="stat"><span id="e-caught">0</span><small>נתפסו</small></div>
        <div class="stat"><span id="e-combo">x1</span><small>קומבו שיא</small></div>
        <div class="stat"><span id="e-coins">0</span><small>🪙 הרווחת</small></div>
      </div>
      <div id="new-record" class="banner hidden">🏆 שיא חדש!</div>
      <div id="vs-result" class="banner hidden"></div>
      <div id="new-species" class="banner species hidden"></div>
      <div id="mission-done" class="banner done hidden">✅ משימה יומית הושלמה!</div>

      <div class="name-row" id="name-row">
        <input id="player-name" class="name-input" maxlength="12" placeholder="השם שלך" />
        <button id="save-score-btn" class="btn btn-primary btn-small">שמור</button>
      </div>

      <button id="again-btn" class="btn btn-primary big">שחק שוב 🔁</button>
      <div class="btn-row">
        <button id="challenge-btn" class="btn btn-ghost">🔗 אתגר חבר</button>
        <button id="home-btn" class="btn btn-ghost">בית</button>
      </div>

      <ol id="top3" class="top3"></ol>
    </div>
  </section>

  <div id="toast" class="toast hidden"></div>

  <script src="js/audio.js"></script>
  <script src="assets/sprites/sprites.js"></script>
  <script src="js/data.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
