name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/pokemon-go-ar-game-ocWUA
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        # NOTE: Pages must be enabled once in Settings -> Pages -> Source:
        # "GitHub Actions". The workflow token cannot create the Pages site
        # itself, so we do NOT use `enablement: true` here.
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the whole repo root (the game is static files)
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
